<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Itens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <header class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
        <div class="container">

            <a class="navbar-brand" href="#">
                <img src="assets/img/logo.png" alt="Participe +" height="60">
            </a>

            <button
                class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-lg-2">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"> Home </a>
                    </li>

                    <li class="nav-item d-none" id="menu-favoritos">
                        <a class="nav-link" href="favoritos.html"> Favoritos </a>
                    </li>

                    <li class="nav-item" id="login">
                        <a class="nav-link" href="login.html" id="text-login"> Login </a>
                    </li>

                    <li class="nav-item d-none" id="menu-cadastrar">
                        <a class="nav-link" href="cadastro_itens.html">Cadastrar</a>
                    </li>

                    <li class="nav-item d-none" id="usuario-logado">
                        <a class="nav-link" href="#" id="nome-usuario"></a>
                    </li>
                </ul>
            </div>

        </div>
    </header>

    <main class="container my-5">

        <h3 class="mb-4 subtitulo">
            Cadastro de Projetos
        </h3>

        <div class="row">

            <!-- card inserir/editar projetos -->

            <div class="col-lg-4">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <input type="hidden" id="idProjeto">

                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text"
                                id="nome"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descrição</label>

                            <textarea
                                id="descricao"
                                rows="4"
                                class="form-control"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Local</label>

                            <input
                                type="text"
                                id="local"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Pessoas Atendidas
                            </label>

                            <input
                                type="number"
                                id="pessoas"
                                class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Voluntários
                            </label>

                            <input
                                type="number"
                                id="voluntarios"
                                class="form-control">
                        </div>


                        <div class="card border mt-4">

                            <div class="card-header bg-light d-flex justify-content-between align-items-center">

                                <strong>
                                    Contatos
                                </strong>

                                <button
                                    class="btn btn-sm w-25"
                                    type="button"
                                    onclick="adicionarContato()">

                                    <i class="bi bi-plus"></i>

                                </button>

                            </div>

                            <div class="card-body">

                                <div id="listaContatos"></div>

                            </div>

                        </div>

                        <div class="card border mt-4">

                            <div class="card-header bg-light d-flex justify-content-between align-items-center">

                                <strong>
                                    Imagens
                                </strong>

                                <button
                                    class="btn btn-sm w-25"
                                    type="button"
                                    onclick="adicionarImagem()">

                                    <i class="bi bi-plus"></i>

                                </button>

                            </div>

                            <div class="card-body">

                                <div id="listaImagens"></div>

                            </div>

                        </div>

                        <div class="d-grid gap-2">

                            <button
                                class="btn"
                                id="btnSalvar">

                                <i class="bi bi-floppy"></i>

                                Salvar Projeto

                            </button>

                            <button
                                class="btn"
                                id="btnCancelar">

                                Limpar

                            </button>
                        </div>

                    </div>

                </div>

                

            </div>

            <!-- tabela que lista todos os projetos -->

            <div class="col-lg-8">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <table class="table table-hover align-middle">

                            <thead>

                                <tr>

                                    <th>Imagem</th>

                                    <th>Nome</th>

                                    <th>Local</th>

                                    <th>Pessoas</th>

                                    <th>Voluntários</th>

                                    <th width="130">
                                        Ações
                                    </th>

                                </tr>

                            </thead>

                            <tbody id="tabelaProjetos">

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="assets/js/database.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/menu.js"></script>

    <script src="assets/js/cadastrarProjeto.js"></script>
</body>
</html>
