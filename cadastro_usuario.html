<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Usuário</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="assets/css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <header class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
        <div class="container">

            <a class="navbar-brand" href="#">
                <img src="assets/img/logo.png" alt="Participe +" height="60">
            </a>

            <button
                class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-lg-2">
                    <li class="nav-item">
                        <a class="nav-link" href="#"> Home </a>
                    </li>

                    <li class="nav-item d-none" id="menu-favoritos">
                        <a class="nav-link" href="#"> Favoritos </a>
                    </li>

                    <li class="nav-item" id="login">
                        <a class="nav-link" href="#" id="text-login"> Login </a>
                    </li>

                    <li class="nav-item d-none" id="menu-cadastrar">
                        <a class="nav-link" href="cadastro_itens.html">Cadastrar</a>
                    </li>

                    <li class="nav-item d-none" id="usuario-logado">
                        <a class="nav-link" href="#" id="nome-usuario"></a>
                    </li>
                </ul>
            </div>

        </div>
    </header>

    <main
      class="container d-flex justify-content-center align-items-center py-5"
      style="min-height: 80vh"
    >
      <div class="card login-card shadow-lg">
        <div class="card-body">
          <div class="text-center mb-4">
            <h2 class="fw-bold">Bem-vindo!</h2>

            <p class="text-muted mb-0">Cadastre-se para acessar o Participe+</p>
          </div>

          <form id="formCadastro">
            <div class="mb-3">

              <label for="loginInput" class="form-label">
                <i class="bi bi-person-fill me-2"></i>
                Login
              </label>

              <input type="text" class="form-control" id="loginInput" placeholder="Digite seu login" required />

            </div>

            <div class="mb-3">

              <label for="nomeInput" class="form-label">
                <i class="bi bi-person-circle"></i>
                Nome
              </label>

              <input type="text" class="form-control" id="nomeInput" placeholder="Digite seu nome" required />

            </div>

            <div class="mb-3">

              <label for="emailInput" class="form-label">
                <i class="bi bi-envelope-at-fill"></i>
                Email
              </label>

              <input type="text" class="form-control" id="emailInput" placeholder="Digite seu email" required />

            </div>

            <div class="mb-4">
              <label for="senhaInput" class="form-label">
                <i class="bi bi-lock-fill me-2"></i>
                Senha
              </label>

              <input type="password" class="form-control" id="senhaInput" placeholder="Digite sua senha" required />
            </div>

            <button class="btn w-100 py-2" type="submit">
              <i class="bi bi-box-arrow-in-right me-2"></i>
              Cadastrar
            </button>
          </form>
        </div>
      </div>
    </main>

    <footer></footer>

    <script>
        document.getElementById("formCadastro").addEventListener("submit", (event) => {

            event.preventDefault();

            const login = document.getElementById("loginInput").value;
            const nome = document.getElementById("nomeInput").value;
            const email = document.getElementById("emailInput").value;
            const senha = document.getElementById("senhaInput").value;

            cadastroUser(login, nome, email, senha);

        });
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="assets/js/app.js"></script>
  </body>
</html>
